apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: octopus-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kim-codefresh/octopusdeploy-test-apps.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: octopus-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true